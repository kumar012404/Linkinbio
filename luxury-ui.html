<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Dashboard | UI Concept</title>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #111111;
            --input-bg: #1a1a1a;
            --gold-primary: #FFD700;
            --gold-secondary: #DAA520;
            --gold-gradient: linear-gradient(135deg, #FFD700, #DAA520);
            --text-color: #ffffff;
            --text-muted: #888888;
            --border-color: #222222;
            --shadow-gold: 0 10px 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 215, 0, 0.05);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            outline: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .dashboard-container {
            width: 100%;
            max-width: 520px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header Section */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--gold-primary);
            letter-spacing: 4px;
            margin-bottom: 4px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }

        .header p {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Card Section */
        .card {
            background-color: var(--card-bg);
            padding: 32px 24px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-gold);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--gold-gradient);
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 16px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            font-size: 1.1rem;
            filter: grayscale(1);
            transition: var(--transition);
        }

        input {
            width: 100%;
            height: 52px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-color);
            padding: 0 16px 0 48px;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        input:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.1);
            background-color: #1f1f1f;
        }

        input:focus ~ .input-icon {
            filter: grayscale(0);
            transform: scale(1.1);
        }

        input::placeholder {
            color: #555;
        }

        /* Buttons */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 32px;
        }

        .btn {
            width: 100%;
            height: 52px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--gold-gradient);
            color: #000;
            border: none;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
        }

        .btn-primary:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 25px rgba(255, 215, 0, 0.4);
            opacity: 0.95;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--gold-primary);
            border: 1px solid var(--gold-primary);
        }

        .btn-secondary:hover {
            background-color: var(--gold-primary);
            color: #000;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .header h1 { font-size: 1.8rem; }
            .card { padding: 24px 16px; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <!-- Header -->
        <div class="header">
            <h1>DASHBOARD</h1>
            <p>Luxury Link Management</p>
        </div>

        <!-- Dashboard Card -->
        <div class="card">
            <div class="form-container">
                <!-- Username -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" placeholder="Username" autocomplete="off">
                    </div>
                </div>

                <!-- Profile Image URL -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">🖼️</span>
                        <input type="url" placeholder="Profile Image URL" autocomplete="off">
                    </div>
                </div>

                <!-- Instagram -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">📸</span>
                        <input type="url" placeholder="Instagram Link" autocomplete="off">
                    </div>
                </div>

                <!-- YouTube -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">📺</span>
                        <input type="url" placeholder="YouTube Link" autocomplete="off">
                    </div>
                </div>

                <!-- WhatsApp -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">💬</span>
                        <input type="url" placeholder="WhatsApp Group Link" autocomplete="off">
                    </div>
                </div>

                <!-- Buttons Area -->
                <div class="button-group">
                    <button class="btn btn-primary">Save Profile Details</button>
                    <a href="#" class="btn btn-secondary">View My Public Profile</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
