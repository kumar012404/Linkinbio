<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkIn Luxury | Login</title>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #111111;
            --input-bg: #1a1a1a;
            --gold-primary: #FFD700; /* Gold */
            --gold-secondary: #DAA520; /* Golden Rod */
            --gold-gradient: linear-gradient(135deg, #FFD700, #DAA520);
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #222222;
            --shadow-glow: 0 10px 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 215, 0, 0.05);
            --btn-glow: 0 5px 20px rgba(255, 215, 0, 0.2);
            --transition: 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            outline: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-glow);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Title Section */
        .title-section {
            margin-bottom: 32px;
        }

        .app-name {
            font-size: 28px;
            font-weight: 700;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 18px;
            color: var(--text-color);
            margin-top: 8px;
            font-weight: 400;
        }

        /* Form Controls */
        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 400;
        }

        input {
            width: 100%;
            height: 48px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-color);
            padding: 0 16px;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        input:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.1);
        }

        /* Login Button */
        .btn-login {
            width: 100%;
            height: 48px;
            background: var(--gold-gradient);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: var(--btn-glow);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-login:hover {
            transform: scale(1.03);
            box-shadow: 0 5px 30px rgba(255, 215, 0, 0.4);
        }

        /* Signup Footer */
        .signup-footer {
            margin-top: 24px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .signup-link {
            color: var(--gold-primary);
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
            transition: var(--transition);
        }

        .signup-link:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            .app-name { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <!-- Title Section -->
        <div class="title-section">
            <h1 class="app-name">LinkIn Luxury</h1>
            <h2 class="subtitle">Login</h2>
        </div>

        <!-- Form Section -->
        <form>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Enter Dashboard</button>
        </form>

        <!-- Signup Footer -->
        <div class="signup-footer">
            Don't have an account?<a href="#" class="signup-link">Sign Up</a>
        </div>
    </div>

</body>
</html>
