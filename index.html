<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkIn luxury | Login & Signup</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>LinkIn Luxury</h1>
        
        <div id="auth-container" class="dashboard-card">
            <h2 id="form-title">Login</h2>
            <div id="auth-error"></div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn">Enter Dashboard</button>
            </form>

            <!-- Signup Form (Hidden by default) -->
            <form id="signup-form" class="hidden">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signup-email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn">Create Account</button>
            </form>

            <div class="auth-switch text-center">
                <span id="switch-text">Don't have an account?</span>
                <a href="#" id="auth-toggle">Sign Up</a>
            </div>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
