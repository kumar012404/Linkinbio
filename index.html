<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkIn Luxury | Portal</title>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Shared Luxury Styles from login.html */
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #111111;
            --input-bg: #1a1a1a;
            --gold-primary: #FFD700;
            --gold-gradient: linear-gradient(135deg, #FFD700, #DAA520);
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #222222;
            --shadow-glow: 0 10px 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 215, 0, 0.05);
            --transition: 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        html {
            overflow-x: hidden;
        }

        .login-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-glow);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .app-name {
            font-size: 28px;
            font-weight: 700;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 18px;
            color: var(--text-color);
            margin-bottom: 25px;
            font-weight: 400;
        }

        .form-group { text-align: left; margin-bottom: 18px; }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            height: 48px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-color);
            padding: 0 16px;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        input:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.1);
        }

        .btn-auth {
            width: 100%;
            height: 50px;
            background: var(--gold-gradient);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.2);
            transition: var(--transition);
        }

        .btn-auth:hover {
            transform: scale(1.03);
            box-shadow: 0 5px 30px rgba(255, 215, 0, 0.4);
        }

        .auth-footer { margin-top: 24px; font-size: 0.9rem; color: var(--text-muted); }

        .auth-link {
            color: var(--gold-primary);
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
            cursor: pointer;
        }

        .auth-link:hover { text-decoration: underline; }

        .error-msg {
            color: #ff4d4d;
            font-size: 0.8rem;
            margin-bottom: 15px;
            min-height: 1.2rem;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1 class="app-name">LinkIn Luxury</h1>
        <h2 id="form-title" class="subtitle">Login</h2>

        <div id="auth-error" class="error-msg"></div>

        <!-- Login Form -->
        <form id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-auth">Enter Dashboard</button>
        </form>

        <!-- Signup Form (Hidden by default) -->
        <form id="signup-form" class="hidden">
            <div class="form-group">
                <label>Create Email</label>
                <input type="email" id="signup-email" placeholder="new@example.com" required>
            </div>
            <div class="form-group">
                <label>Create Password</label>
                <input type="password" id="signup-password" placeholder="Min 6 characters" required minlength="6">
            </div>
            <button type="submit" class="btn-auth">Create Account</button>
        </form>

        <div class="auth-footer">
            <span id="switch-text">Don't have an account?</span>
            <span id="auth-toggle" class="auth-link">Sign Up</span>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
